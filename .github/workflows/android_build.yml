name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install dependencies
      run: npm install

    - name: Install Capacitor Android
      run: |
        npx cap add android
        npx cap sync android

    - name: Bump Version (for Update)
      run: |
        sed -i 's/versionCode 1/versionCode 3/' android/app/build.gradle
        sed -i 's/versionName "1.0"/versionName "1.1.1"/' android/app/build.gradle

    - name: Build APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "Finance Tracker v1.1.1 (A11y Update)"
        body: |
          Update v1.1.1:
          - Full TalkBack accessibility support.
          - Improved focus management and screen reader announcements.
          - Enhanced dynamic element labeling.
          - Bumped version for update compatibility.
        files: android/app/build/outputs/apk/debug/app-debug.apk
        prerelease: true
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: finance-tracker-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
