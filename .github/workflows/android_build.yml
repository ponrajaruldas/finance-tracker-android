name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install dependencies
      run: npm install

    - name: Install Capacitor Android
      run: |
        npx cap add android
        npx cap sync android

    - name: Bump Version (for Update)
      run: |
        sed -i 's/versionCode 1/versionCode 113/' android/app/build.gradle
        sed -i 's/versionName \"1.0\"/versionName \"1.1.13\"/' android/app/build.gradle

    - name: Build APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v1.1.13"
        name: "Finance Tracker v1.1.13 (TalkBack & A11y Fix)"
        body: |
          Update v1.1.13:
          - Core Fix: TalkBack accessibility for "Add Transaction" modal.
          - Enhanced focus management (locks to modal during entry).
          - Background content is now hidden (aria-hidden) while modal is active.
          - Modal visibility logic fixed for cleaner transitions.
          - Updated version for update compatibility.
        files: android/app/build/outputs/apk/debug/app-debug.apk
        prerelease: false
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: finance-tracker-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
